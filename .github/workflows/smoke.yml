name: Smoke MH-Core
on:
  workflow_dispatch:
    inputs:
      base_url:
        required: true
        type: string
permissions:
  contents: read
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - env:
          BASE_URL: ${{ inputs.base_url }}
        run: |
          case "$BASE_URL" in https://*) ;; *) exit 1 ;; esac
          curl -fsS --retry 3 "$BASE_URL/" > home.json
          python -c "import json; assert 'MH Core' in json.load(open('home.json')).get('message','')"
      - uses: actions/upload-artifact@v7
        with:
          name: mh-core-smoke
          path: home.json
