name: MH-Core CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mh-core-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests con Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONPATH: .
      MH_CORE_API_KEY: clave-ci-segura-nunca-usar-en-produccion-1234567890

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas
        run: pytest -q

      - name: Verificar importación de la aplicación
        run: python -c "import mh_core.app; print('mh_core.app importa correctamente')"
