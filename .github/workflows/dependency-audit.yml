name: Security - Dependency audit

on:
  push:
    branches: [main]
    paths:
      - requirements.txt
      - .github/workflows/dependency-audit.yml
  pull_request:
    branches: [main]
    paths:
      - requirements.txt
      - .github/workflows/dependency-audit.yml
  schedule:
    - cron: "59 9 * * 4"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Auditar paquetes Python
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar auditor
        run: python -m pip install --upgrade pip pip-audit

      - name: Auditar requirements.txt
        run: pip-audit --requirement requirements.txt --progress-spinner off
