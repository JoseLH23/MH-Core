name: Security - Dependency audit

on:
  push:
    branches: [main]
    paths:
      - requirements.txt
      - scripts/check_pip_audit.py
      - .github/workflows/dependency-audit.yml
  pull_request:
    branches: [main]
    paths:
      - requirements.txt
      - scripts/check_pip_audit.py
      - .github/workflows/dependency-audit.yml
  schedule:
    - cron: "59 9 * * 4"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip pip-audit
      - shell: bash
        run: pip-audit --requirement requirements.txt --format json --output pip-audit.json --progress-spinner off || true
      - uses: actions/upload-artifact@v7
        with:
          name: dependency-report
          path: pip-audit.json
          retention-days: 14
      - run: python scripts/check_pip_audit.py
