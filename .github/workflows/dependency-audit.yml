name: Security - Dependency audit

on:
  push:
    branches: [main]
    paths:
      - requirements.txt
      - scripts/check_pip_audit.py
      - .github/workflows/dependency-audit.yml
  pull_request:
    branches: [main]
    paths:
      - requirements.txt
      - scripts/check_pip_audit.py
      - .github/workflows/dependency-audit.yml
  schedule:
    - cron: "59 9 * * 4"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Auditar paquetes Python
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar auditor
        run: python -m pip install --upgrade pip pip-audit

      - name: Generar reporte
        shell: bash
        run: pip-audit --requirement requirements.txt --format json --output pip-audit.json --progress-spinner off || true

      - name: Evaluar reporte
        run: python scripts/check_pip_audit.py
